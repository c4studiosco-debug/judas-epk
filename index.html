<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUDAS — Electronic Press Kit 2026</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink:  #FF2D8B;
      --blue:  #00F0FF;
      --white: #F5F0F0;
      --black: #0A0A0A;
      --grey:  #1A1A1A;
      --grey2: #2B2B2B;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

    /* cursor — uses transform3d for GPU compositing, no layout thrash */
    .cursor { width:12px;height:12px;border-radius:50%;background:var(--pink);position:fixed;top:0;left:0;pointer-events:none;z-index:9999;will-change:transform;transform:translate3d(-50%,-50%,0);transition:transform .12s ease,background .15s; }
    .cursor-ring { width:36px;height:36px;border-radius:50%;border:1.5px solid var(--blue);position:fixed;top:0;left:0;pointer-events:none;z-index:9998;will-change:transform;transform:translate3d(-50%,-50%,0);opacity:.7; }

    nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:linear-gradient(to bottom,rgba(10,10,10,.95),transparent);backdrop-filter:blur(4px); }
    .nav-logo { font-family:var(--font-display);font-size:26px;letter-spacing:.2em;color:var(--white);text-decoration:none; }
    .nav-logo span { color:var(--pink); }
    .nav-links { display:flex;gap:32px;list-style:none; }
    .nav-links a { font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--white);text-decoration:none;opacity:.7;transition:opacity .2s,color .2s; }
    .nav-links a:hover { opacity:1;color:var(--pink); }

    #hero { min-height:100vh;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden; }
    .hero-left { display:flex;flex-direction:column;justify-content:flex-end;padding:120px 60px 80px;position:relative;z-index:2; }
    .hero-tag { font-family:var(--font-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-bottom:20px;opacity:0;animation:fadeUp .8s .3s forwards; }
    .hero-name { font-family:var(--font-display);font-size:clamp(60px,10vw,140px);line-height:1;color:var(--white);opacity:0;animation:fadeUp .8s .5s forwards;white-space:nowrap; }
    .hero-name .stroke { -webkit-text-stroke:2px var(--white);color:transparent; }
    .hero-name .pink { color:var(--pink); }
    .hero-sub { font-family:var(--font-mono);font-size:13px;line-height:1.8;color:var(--white);opacity:0;max-width:420px;margin-top:30px;animation:fadeUp .8s .8s forwards; }
    .hero-cta { display:flex;gap:16px;margin-top:40px;opacity:0;animation:fadeUp .8s 1s forwards; }
    .btn { font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:14px 28px;text-decoration:none;border:none;cursor:none;transition:transform .2s,box-shadow .2s;display:inline-block; }
    .btn:hover { transform:translateY(-3px); }
    .btn-primary { background:var(--pink);color:var(--black);box-shadow:0 0 30px rgba(255,45,139,.5); }
    .btn-primary:hover { box-shadow:0 0 50px rgba(255,45,139,.8); }
    .btn-outline { background:transparent;color:var(--blue);border:1px solid var(--blue); }
    .btn-outline:hover { background:rgba(0,240,255,.1);box-shadow:0 0 30px rgba(0,240,255,.3); }
    .hero-right { position:relative;overflow:hidden; }
    .hero-img-wrap { position:absolute;inset:0; }
    .hero-img-wrap img { width:100%;height:100%;object-fit:cover;object-position:top center;filter:grayscale(100%) contrast(1.4) brightness(0.88); }
    .hero-img-overlay { position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,139,.2) 0%,rgba(0,240,255,.1) 100%);mix-blend-mode:screen; }
    .hero-img-fade { position:absolute;left:0;top:0;bottom:0;width:200px;background:linear-gradient(to right,var(--black),transparent); }
    .ticker-wrap { position:absolute;bottom:0;left:0;right:0;background:var(--pink);overflow:hidden;height:40px;display:flex;align-items:center;z-index:3; }
    .ticker-track { display:flex;white-space:nowrap;animation:ticker 18s linear infinite; }
    .ticker-track span { font-family:var(--font-display);font-size:18px;letter-spacing:.1em;color:var(--black);padding:0 30px; }
    .ticker-track span.dot { opacity:.4; }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .section-label { font-family:var(--font-mono);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;display:block; }
    h2 { font-family:var(--font-display);font-size:clamp(56px,7vw,100px);line-height:.9;color:var(--white);margin-bottom:50px; }
    h2 .accent { color:var(--pink); }
    .divider { height:1px;background:linear-gradient(to right,transparent,var(--grey2),transparent);margin:0 40px; }

    #about { display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:100px 40px;max-width:1400px;margin:0 auto; }
    .about-img { position:relative; }
    .about-img img { width:100%;aspect-ratio:3/4;object-fit:cover;object-position:bottom right;filter:grayscale(100%) contrast(1.05); }
    .about-img::before { content:'';position:absolute;inset:-8px -8px 8px 8px;border:1px solid var(--pink);z-index:-1;opacity:.6; }
    .about-img::after { content:'';position:absolute;inset:-16px -16px 16px 16px;border:1px solid var(--blue);z-index:-2;opacity:.3; }
    .about-text p { font-size:16px;line-height:1.8;color:rgba(245,240,240,.75);margin-bottom:24px; }
    .about-text p strong { color:var(--white); }

    #music { background:var(--grey);padding:100px 40px;position:relative;overflow:hidden; }
    #music > div { max-width:1400px;margin:0 auto; }
    .single-grid { display:grid;grid-template-columns:380px 1fr;gap:80px;align-items:center;position:relative; }
    .cover-wrap { position:relative;z-index:2; }
    .cover-wrap img { width:100%;display:block;box-shadow:30px 30px 0 var(--pink),-8px -8px 60px rgba(0,240,255,.3); }
    .release-badge { position:absolute;top:-16px;right:-16px;background:var(--blue);color:var(--black);font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;font-weight:700; }
    .single-info { position:relative;z-index:2; }
    .single-info h3 { font-family:var(--font-display);font-size:clamp(60px,8vw,110px);line-height:.85;color:var(--white); }
    .single-info h3 .stroke { -webkit-text-stroke:2px var(--white);color:transparent; }
    .single-info .artist-name { font-family:var(--font-mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--pink);margin-bottom:8px; }
    .single-info p { font-size:15px;line-height:1.8;color:rgba(245,240,240,.65);max-width:480px;margin:28px 0 40px; }
    .single-links { display:flex;gap:12px;flex-wrap:wrap; }
    .stream-btn { font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:12px 22px;border:1px solid var(--grey2);color:var(--white);text-decoration:none;transition:all .2s;cursor:none; }
    .stream-btn:hover { border-color:var(--pink);color:var(--pink);box-shadow:0 0 20px rgba(255,45,139,.2); }
    .stream-btn[href=""] { display:none; }

    /* photos section */
    #photos { padding:100px 40px;position:relative;overflow:hidden; }
    #photosCanvas { position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0; }
    /* scanlines via CSS — zero JS cost */
    #photos::after { content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:2; }
    #photos > div { max-width:1400px;margin:0 auto;position:relative;z-index:3; }
    .photo-grid { display:grid;grid-template-columns:repeat(12,1fr);gap:12px; }
    .photo-item { overflow:hidden;position:relative;cursor:none; }
    .photo-item img { width:100%;height:100%;object-fit:cover;object-position:top;filter:grayscale(100%) contrast(1.05);transition:filter .4s ease,transform .6s cubic-bezier(.17,.67,.38,1.3); }
    .photo-item:hover img { filter:grayscale(60%) contrast(1.1);transform:scale(1.04); }
    .photo-item::after { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,139,.3),rgba(0,240,255,.2));opacity:0;transition:opacity .3s; }
    .photo-item:hover::after { opacity:1; }
    .p1{grid-column:span 5;aspect-ratio:3/4}
    .p2{grid-column:span 4;aspect-ratio:1/1;align-self:end}
    .p3{grid-column:span 3;aspect-ratio:2/3}
    .p4{grid-column:span 7;aspect-ratio:4/3}
    .p5{grid-column:span 5;aspect-ratio:4/3}

    .press-strip { background:var(--pink);padding:60px 40px;text-align:center;position:relative;overflow:hidden; }
    .press-strip::before { content:'"';font-family:var(--font-display);font-size:400px;color:rgba(0,0,0,.1);position:absolute;top:-100px;left:40px;line-height:1;pointer-events:none; }
    .press-strip blockquote { font-family:var(--font-display);font-size:clamp(32px,5vw,64px);color:var(--black);max-width:900px;margin:0 auto 20px;line-height:1.1;position:relative;z-index:1; }
    .press-strip blockquote .flash-word { animation:wordFlash .6s steps(1) infinite; }
    @keyframes wordFlash { 0%,49%{color:var(--black)} 50%,100%{color:var(--white)} }
    .press-strip cite { font-family:var(--font-mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.55); }

    #contact { background:var(--grey);padding:100px 0; }
    #contact > div { max-width:700px;margin:0 auto;padding:0 40px;text-align:center; }
    #contact h2 { text-align:center; }
    #contact .section-label { text-align:center; }
    .contact-info { list-style:none;margin-top:20px; }
    .contact-info li { padding:18px 0;border-bottom:1px solid var(--grey2);display:flex;flex-direction:column;align-items:center;gap:10px; }
    .contact-info li:first-child { border-top:1px solid var(--grey2); }
    .contact-label { font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue); }
    .contact-val { font-size:15px;color:var(--white);text-align:center; }
    .contact-btn { font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:11px 22px;background:var(--pink);color:var(--black);text-decoration:none;font-weight:700;transition:all .2s;cursor:none;display:inline-block; }
    .contact-btn:hover { background:var(--blue);box-shadow:0 0 20px rgba(0,240,255,.4); }

    .footer-wrap { position:relative;overflow:hidden;background:var(--black); }
    #footerCanvas { position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0; }
    /* scanlines via CSS on footer too */
    .footer-wrap::after { content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:1; }
    footer { padding:50px 40px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--grey2);position:relative;z-index:2; }
    .footer-logo { font-family:var(--font-display);font-size:32px;mix-blend-mode:difference;color:var(--white); }
    .footer-copy { font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-align:center;mix-blend-mode:difference;color:var(--white); }

    .reveal { opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease; }
    .reveal.visible { opacity:1;transform:translateY(0); }
    .reveal-delay-1 { transition-delay:.15s; }
    .reveal-delay-2 { transition-delay:.3s; }
    .reveal-delay-3 { transition-delay:.45s; }
    .loading { display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-display);font-size:40px;color:var(--pink);letter-spacing:.2em; }

    /* hamburger */
    .nav-hamburger { display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;z-index:200; }
    .nav-hamburger span { display:block;width:24px;height:2px;background:var(--white);transition:all .3s; }
    .nav-hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
    .nav-hamburger.open span:nth-child(2) { opacity:0; }
    .nav-hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }
    .nav-mobile-menu { display:none;position:fixed;inset:0;background:rgba(10,10,10,.97);z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:40px; }
    .nav-mobile-menu.open { display:flex; }
    .nav-mobile-menu a { font-family:var(--font-display);font-size:48px;letter-spacing:.1em;color:var(--white);text-decoration:none;transition:color .2s; }
    .nav-mobile-menu a:hover { color:var(--pink); }

    @media(max-width:900px){
      body { cursor:auto; }
      .cursor,.cursor-ring { display:none; }
      nav { padding:16px 20px; }
      .nav-links { display:none; }
      .nav-hamburger { display:flex; }
      #hero { grid-template-columns:1fr;min-height:100vh;position:relative; }
      .hero-right { display:block;position:absolute;inset:0;z-index:0; }
      .hero-img-wrap { position:absolute;inset:0; }
      .hero-img-wrap img { width:100%;height:100%;object-fit:cover;object-position:top center;filter:grayscale(100%) contrast(1.4) brightness(0.88); }
      .hero-img-overlay { position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,139,.2),rgba(0,240,255,.1));mix-blend-mode:screen; }
      .hero-left { position:relative;z-index:2;padding:100px 24px 80px;background:linear-gradient(to top,rgba(10,10,10,.92) 60%,rgba(10,10,10,.4) 100%); }
      .hero-img-fade { display:none; }
      .hero-name { font-size:clamp(72px,18vw,120px); }
      .hero-sub { font-size:12px;max-width:100%; }
      .hero-cta { flex-direction:column;gap:12px; }
      .btn { text-align:center;padding:16px 24px; }
      .ticker-track span { font-size:15px;padding:0 18px; }
      #music { padding:60px 20px; }
      .single-grid { grid-template-columns:1fr;gap:40px; }
      .cover-wrap img { max-width:300px;margin:0 auto;display:block; }
      .release-badge { top:-12px;right:0; }
      .single-info h3 { font-size:clamp(52px,14vw,90px); }
      .single-info p { font-size:14px; }
      #about { grid-template-columns:1fr;padding:60px 20px;gap:0; }
      .about-img { display:block;margin-bottom:40px; }
      .about-img img { aspect-ratio:3/2;object-position:center top; }
      .about-img::before,.about-img::after { display:none; }
      .about-text p { font-size:15px; }
      h2 { font-size:clamp(48px,12vw,80px);margin-bottom:30px; }
      #photos { padding:60px 12px; }
      .photo-grid { grid-template-columns:1fr 1fr;gap:8px; }
      .p1,.p2,.p3,.p4,.p5 { grid-column:span 1; }
      .photo-item { aspect-ratio:3/4; }
      .photo-item.p4 { grid-column:span 2;aspect-ratio:4/3; }
      .press-strip { padding:40px 20px; }
      #contact { padding:60px 0; }
      #contact > div { padding:0 20px; }
      .contact-info li { flex-direction:column;align-items:flex-start;gap:10px;padding:16px 0; }
      .contact-btn { width:100%;text-align:center;padding:14px 20px; }
      footer { padding:40px 20px;flex-direction:column;gap:16px;text-align:center; }
      .footer-logo { font-size:28px; }
      .footer-copy { font-size:9px; }
      .section-label { font-size:9px; }
    }
    @media(max-width:480px){
      .hero-name { font-size:clamp(60px,20vw,100px); }
      .single-info h3 { font-size:clamp(48px,16vw,80px); }
      .cover-wrap img { max-width:260px; }
      .photo-grid { gap:6px; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div id="app"><div class="loading">LOADING...</div></div>

<script>
// ── CURSOR — translate3d keeps it on GPU compositor thread ──
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0, my=0, rx=0, ry=0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate3d(calc(${mx}px - 50%), calc(${my}px - 50%), 0)`;
}, { passive: true });

(function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.transform = `translate3d(calc(${rx}px - 50%), calc(${ry}px - 50%), 0)`;
  requestAnimationFrame(animRing);
})();

// ── DEBOUNCE HELPER ──────────────────────────────────
function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

async function loadJSON(path) {
  try { const r = await fetch(path); if (!r.ok) return null; return r.json(); } catch(e) { return null; }
}

async function init() {
  const [general, single] = await Promise.all([
    loadJSON('/content/general.json'),
    loadJSON('/content/single.json'),
  ]);
  const g = general || {};
  const s = single  || {};

  const streamLinks = [
    { key:'spotify',    label:'Spotify' },
    { key:'apple',      label:'Apple Music' },
    { key:'soundcloud', label:'SoundCloud' },
    { key:'youtube',    label:'YouTube' },
  ].filter(l => s[l.key])
   .map(l => `<a href="${s[l.key]}" class="stream-btn" target="_blank">${l.label}</a>`)
   .join('') || `<a href="#contact" class="stream-btn" style="background:var(--pink);color:var(--black);border-color:var(--pink);font-weight:700;">PRE-SAVE NOW</a>`;

  const email       = g.email    || 'judas@aprettysob.com';
  const instaHandle = g.instagram|| '@aprettysob';
  const instaSlug   = instaHandle.replace('@','');

  document.getElementById('app').innerHTML = `
    <nav>
      <a href="#hero" class="nav-logo">JUD<span>A</span>S</a>
      <ul class="nav-links">
        <li><a href="#music">Music</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#photos">Press</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <div class="nav-hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
    </nav>
    <div class="nav-mobile-menu" id="mobileMenu">
      <a href="#music"   onclick="closeMenu()">Music</a>
      <a href="#about"   onclick="closeMenu()">About</a>
      <a href="#photos"  onclick="closeMenu()">Press</a>
      <a href="#contact" onclick="closeMenu()">Contact</a>
    </div>

    <header id="hero">
      <div class="hero-left">
        <p class="hero-tag">Debut Single, 6/26/26</p>
        <h1 class="hero-name">JU<span class="stroke">D</span><span class="pink">AS</span></h1>
        <p class="hero-sub">${g.tagline||'Queer pop provocateur. Main character energy.'}</p>
        <div class="hero-cta">
          <a href="#music"   class="btn btn-primary">PRE-SAVE NOW</a>
          <a href="#photos"  class="btn btn-outline">PRESS KIT</a>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-img-wrap">
          <img src="${g.hero_image||'/images/Judas_2.jpg'}" alt="${g.artist_name||'Judas'} press photo" fetchpriority="high" />
          <div class="hero-img-overlay"></div>
          <div class="hero-img-fade"></div>
        </div>
      </div>
      <div class="ticker-wrap">
        <div class="ticker-track">
          <span>${g.artist_name||'JUDAS'}</span><span class="dot">✦</span>
          <span>${s.title||'LYING THIEF'}</span><span class="dot">✦</span>
          <span>6/26/26</span><span class="dot">✦</span>
          <span>QUEER POP</span><span class="dot">✦</span>
          <span>${instaHandle.toUpperCase()}</span><span class="dot">✦</span>
          <span>${g.artist_name||'JUDAS'}</span><span class="dot">✦</span>
          <span>${s.title||'LYING THIEF'}</span><span class="dot">✦</span>
          <span>6/26/26</span><span class="dot">✦</span>
          <span>QUEER POP</span><span class="dot">✦</span>
          <span>${instaHandle.toUpperCase()}</span><span class="dot">✦</span>
        </div>
      </div>
    </header>

    <section id="music">
      <div>
        <span class="section-label">Debut Single</span>
        <div class="single-grid">
          <div class="cover-wrap reveal">
            <img src="${s.cover||'/images/Lying_Thief_Final_Cover_Art.jpg'}" alt="${s.title||'Lying Thief'} cover art" loading="lazy" decoding="async" />
            <div class="release-badge">6/26/26</div>
          </div>
          <div class="single-info">
            <div class="artist-name">${g.artist_name||'Judas'}</div>
            <h3 class="reveal">${(s.title||'LYING THIEF').replace(' ','<br><span class="stroke">').replace(/$/,'</span>')}</h3>
            <p class="reveal reveal-delay-1">Lying Thief is a scandalous club confession celebrating power and desire, drawing from the dark-pop energy of Charli XCX &amp; Slayyyter. Judas lures you onto the dance floor, his lips brushing against yours, close enough to taste. He captures your burning desire, and just as you want more, he disappears like a thief into the night. It's the best kiss you never had. Judas doesn't hold back on this all-important debut single, delivering electropop with claws. Let Lying Thief's intoxicating beats beckon you in and lose yourself to its siren call.</p>

        <p class="reveal">Judas is the part of you that refuses to apologize. Sexy, savage, fluid, free. Everything you were taught to keep quiet. Electropop with claws: nasty beats, glitchy synths, propulsive energy, seductive to the core. Hot pink distortion. His corrupted pop possesses your body to move and your voice to take up space.</p>
        <p class="reveal reveal-delay-1">Judas exploded onto the scene with a debut performance to thousands at Electroluxx Pride in San Francisco. Full production, iconic visuals and full choreography from day one. A queer pop provocateur, he exists for the parts of us that shrink to make others comfortable. Judas beckons you to embrace your power.</p>
        <p class="reveal reveal-delay-2">A fallen angel born under 666, he sacrificed his halo to set the stage on fire. Canadian-born and world-traveled, he's spent his life carving a path entirely his own, now SF and LA based. His debut single, "Lying Thief" will break all the rules on June 26, 2026. Trouble is on the way.</p>

// ── SHARED OPTIMISED STATIC ENGINE ──────────────────
// Renders noise at 1/4 resolution then scales up — 16x cheaper than full-res pixel loop.
// Uses IntersectionObserver to pause when off-screen.
function initStatic(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d', { alpha: false });

  // small offscreen buffer for noise — drawn at low res, scaled up
  const buf    = document.createElement('canvas');
  const bufCtx = buf.getContext('2d', { alpha: false });
  const SCALE  = 4; // render at 1/4 size

  const COLORS = [
    [10,10,10],
    [245,240,240],
    [255,45,139],
    [0,240,255],
  ];
  let phaseT=0, colorIdx=0;
  const PHASE_DUR = 180;
  let fromC = COLORS[0], toC = COLORS[1];

  function lerp(a,b,t){ return Math.round(a+(b-a)*t); }
  function lerpColor(a,b,t){ return [lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)]; }

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    buf.width  = Math.max(1, Math.floor(canvas.width  / SCALE));
    buf.height = Math.max(1, Math.floor(canvas.height / SCALE));
  }
  resize();
  window.addEventListener('resize', debounce(resize, 150));

  let visible = true;
  const visObs = new IntersectionObserver(entries => {
    visible = entries[0].isIntersecting;
  }, { threshold: 0 });
  visObs.observe(canvas.parentElement || canvas);

  let raf;
  function loop() {
    raf = requestAnimationFrame(loop);
    if (!visible) return; // pause when off-screen

    const W = buf.width, H = buf.height;

    phaseT++;
    if (phaseT > PHASE_DUR) {
      phaseT = 0;
      colorIdx = (colorIdx + 1) % COLORS.length;
      fromC = COLORS[colorIdx];
      toC   = COLORS[(colorIdx + 1) % COLORS.length];
    }
    const t  = phaseT / PHASE_DUR;
    const bg = lerpColor(fromC, toC, t);

    // fill base colour
    bufCtx.fillStyle = `rgb(${bg[0]},${bg[1]},${bg[2]})`;
    bufCtx.fillRect(0, 0, W, H);

    // noise at low resolution
    const imgData = bufCtx.getImageData(0, 0, W, H);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 110;
      d[i]   = Math.min(255, Math.max(0, d[i]   + n));
      d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
      d[i+2] = Math.min(255, Math.max(0, d[i+2] + n));
    }
    bufCtx.putImageData(imgData, 0, 0);

    // scale up to full canvas — pixelated gives chunky static look
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(buf, 0, 0, canvas.width, canvas.height);
  }
  loop();
}

  document.getElementById('mobileMenu').classList.toggle('open');
}

  document.getElementById('mobileMenu').classList.remove('open');
}
