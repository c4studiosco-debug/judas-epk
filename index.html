<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUDAS — Electronic Press Kit 2026</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink:  #FF2D8B;
      --blue:  #00F0FF;
      --white: #F5F0F0;
      --black: #0A0A0A;
      --grey:  #1A1A1A;
      --grey2: #2B2B2B;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

    .cursor { width:12px;height:12px;border-radius:50%;background:var(--pink);position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transition:transform .15s ease,background .2s;transform:translate(-50%,-50%); }
    .cursor-ring { width:36px;height:36px;border-radius:50%;border:1.5px solid var(--blue);position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:transform .35s cubic-bezier(.17,.67,.83,.67);transform:translate(-50%,-50%);opacity:.7; }

    nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:linear-gradient(to bottom,rgba(10,10,10,.95),transparent);backdrop-filter:blur(4px); }
    .nav-logo { font-family:var(--font-display);font-size:26px;letter-spacing:.2em;color:var(--white);text-decoration:none; }
    .nav-logo span { color:var(--pink); }
    .nav-links { display:flex;gap:32px;list-style:none; }
    .nav-links a { font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--white);text-decoration:none;opacity:.7;transition:opacity .2s,color .2s; }
    .nav-links a:hover { opacity:1;color:var(--pink); }

    /* #1 sharper hero image */
    #hero { min-height:100vh;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden; }
    .hero-left { display:flex;flex-direction:column;justify-content:flex-end;padding:120px 60px 80px;position:relative;z-index:2; }
    .hero-tag { font-family:var(--font-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);margin-bottom:20px;opacity:0;animation:fadeUp .8s .3s forwards; }
    .hero-name { font-family:var(--font-display);font-size:clamp(60px,10vw,140px);line-height:1;color:var(--white);opacity:0;animation:fadeUp .8s .5s forwards;white-space:nowrap; }
    .hero-name .stroke { -webkit-text-stroke:2px var(--white);color:transparent; }
    .hero-name .pink { color:var(--pink); }
    .hero-sub { font-family:var(--font-mono);font-size:13px;line-height:1.8;color:var(--white);opacity:0;max-width:420px;margin-top:30px;animation:fadeUp .8s .8s forwards; }
    .hero-cta { display:flex;gap:16px;margin-top:40px;opacity:0;animation:fadeUp .8s 1s forwards; }
    .btn { font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:14px 28px;text-decoration:none;border:none;cursor:none;transition:transform .2s,box-shadow .2s;display:inline-block; }
    .btn:hover { transform:translateY(-3px); }
    .btn-primary { background:var(--pink);color:var(--black);box-shadow:0 0 30px rgba(255,45,139,.5); }
    .btn-primary:hover { box-shadow:0 0 50px rgba(255,45,139,.8); }
    .btn-outline { background:transparent;color:var(--blue);border:1px solid var(--blue); }
    .btn-outline:hover { background:rgba(0,240,255,.1);box-shadow:0 0 30px rgba(0,240,255,.3); }
    .hero-right { position:relative;overflow:hidden; }
    .hero-img-wrap { position:absolute;inset:0; }
    /* #1: sharper — higher contrast, no grain, deep blacks */
    .hero-img-wrap img { width:100%;height:100%;object-fit:cover;object-position:top center;filter:grayscale(100%) contrast(1.4) brightness(0.88); }
    .hero-img-overlay { position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,139,.2) 0%,rgba(0,240,255,.1) 100%);mix-blend-mode:screen; }
    .hero-img-fade { position:absolute;left:0;top:0;bottom:0;width:200px;background:linear-gradient(to right,var(--black),transparent); }
    .ticker-wrap { position:absolute;bottom:0;left:0;right:0;background:var(--pink);overflow:hidden;height:40px;display:flex;align-items:center;z-index:3; }
    .ticker-track { display:flex;white-space:nowrap;animation:ticker 18s linear infinite; }
    .ticker-track span { font-family:var(--font-display);font-size:18px;letter-spacing:.1em;color:var(--black);padding:0 30px; }
    .ticker-track span.dot { opacity:.4; }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .section-label { font-family:var(--font-mono);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;display:block; }
    h2 { font-family:var(--font-display);font-size:clamp(56px,7vw,100px);line-height:.9;color:var(--white);margin-bottom:50px; }
    h2 .accent { color:var(--pink); }
    .divider { height:1px;background:linear-gradient(to right,transparent,var(--grey2),transparent);margin:0 40px; }

    #about { display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:100px 40px;max-width:1400px;margin:0 auto; }
    .about-img { position:relative; }
    .about-img img { width:100%;aspect-ratio:3/4;object-fit:cover;object-position:bottom right;filter:grayscale(100%) contrast(1.05); }
    .about-img::before { content:'';position:absolute;inset:-8px -8px 8px 8px;border:1px solid var(--pink);z-index:-1;opacity:.6; }
    .about-img::after { content:'';position:absolute;inset:-16px -16px 16px 16px;border:1px solid var(--blue);z-index:-2;opacity:.3; }
    .about-text p { font-size:16px;line-height:1.8;color:rgba(245,240,240,.75);margin-bottom:24px; }
    .about-text p strong { color:var(--white); }

    #music { background:var(--grey);padding:100px 40px;position:relative;overflow:hidden; }
    #music > div { max-width:1400px;margin:0 auto; }
    .single-grid { display:grid;grid-template-columns:380px 1fr;gap:80px;align-items:center;position:relative; }
    .cover-wrap { position:relative;z-index:2; }
    .cover-wrap img { width:100%;display:block;box-shadow:30px 30px 0 var(--pink),-8px -8px 60px rgba(0,240,255,.3); }
    .release-badge { position:absolute;top:-16px;right:-16px;background:var(--blue);color:var(--black);font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;font-weight:700; }
    .single-info { position:relative;z-index:2; }
    .single-info h3 { font-family:var(--font-display);font-size:clamp(60px,8vw,110px);line-height:.85;color:var(--white); }
    .single-info h3 .stroke { -webkit-text-stroke:2px var(--white);color:transparent; }
    .single-info .artist-name { font-family:var(--font-mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--pink);margin-bottom:8px; }
    .single-info p { font-size:15px;line-height:1.8;color:rgba(245,240,240,.65);max-width:480px;margin:28px 0 40px; }
    .single-links { display:flex;gap:12px;flex-wrap:wrap; }
    .stream-btn { font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:12px 22px;border:1px solid var(--grey2);color:var(--white);text-decoration:none;transition:all .2s;cursor:none; }
    .stream-btn:hover { border-color:var(--pink);color:var(--pink);box-shadow:0 0 20px rgba(255,45,139,.2); }
    .stream-btn[href=""] { display:none; }
    #musicCrossCanvas { position:absolute;top:0;right:0;width:calc(100% - 500px);height:100%;pointer-events:none;z-index:1; }

    #photos { padding:100px 40px; }
    #photos > div { max-width:1400px;margin:0 auto; }
    .photo-grid { display:grid;grid-template-columns:repeat(12,1fr);gap:12px; }
    .photo-item { overflow:hidden;position:relative;cursor:none; }
    .photo-item img { width:100%;height:100%;object-fit:cover;object-position:top;filter:grayscale(100%) contrast(1.05);transition:filter .4s ease,transform .6s cubic-bezier(.17,.67,.38,1.3); }
    .photo-item:hover img { filter:grayscale(60%) contrast(1.1);transform:scale(1.04); }
    .photo-item::after { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,139,.3),rgba(0,240,255,.2));opacity:0;transition:opacity .3s; }
    .photo-item:hover::after { opacity:1; }
    .p1{grid-column:span 5;aspect-ratio:3/4}
    .p2{grid-column:span 4;aspect-ratio:1/1;align-self:end}
    .p3{grid-column:span 3;aspect-ratio:2/3}
    .p4{grid-column:span 7;aspect-ratio:4/3;}
    .p5{grid-column:span 5;aspect-ratio:4/3}

    .press-strip { background:var(--pink);padding:60px 40px;text-align:center;position:relative;overflow:hidden; }
    .press-strip::before { content:'"';font-family:var(--font-display);font-size:400px;color:rgba(0,0,0,.1);position:absolute;top:-100px;left:40px;line-height:1;pointer-events:none; }
    .press-strip blockquote { font-family:var(--font-display);font-size:clamp(32px,5vw,64px);color:var(--black);max-width:900px;margin:0 auto 20px;line-height:1.1;position:relative;z-index:1; }
    .press-strip cite { font-family:var(--font-mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.55); }

    /* #12 contact — simplified, no form, no grid */
    #contact { background:var(--grey);padding:100px 0; }
    #contact > div { max-width:700px;margin:0 auto;padding:0 40px; }
    .contact-info { list-style:none;margin-top:20px; }
    .contact-info li { padding:18px 0;border-bottom:1px solid var(--grey2);display:flex;gap:20px;align-items:center; }
    .contact-info li:first-child { border-top:1px solid var(--grey2); }
    .contact-label { font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);min-width:100px; }
    .contact-val { font-size:15px;color:var(--white); }
    .contact-btn { font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:11px 22px;background:var(--pink);color:var(--black);text-decoration:none;font-weight:700;transition:all .2s;cursor:none;display:inline-block; }
    .contact-btn:hover { background:var(--blue);box-shadow:0 0 20px rgba(0,240,255,.4); }

    /* #14 footer static */
    .footer-wrap { position:relative;overflow:hidden;background:var(--black); }
    #footerCanvas { position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0; }
    footer { padding:50px 40px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--grey2);position:relative;z-index:2; }
    .footer-logo { font-family:var(--font-display);font-size:32px;mix-blend-mode:difference;color:var(--white); }
    .footer-copy { font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-align:center;mix-blend-mode:difference;color:var(--white); }

    .reveal { opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease; }
    .reveal.visible { opacity:1;transform:translateY(0); }
    .reveal-delay-1 { transition-delay:.15s; }
    .reveal-delay-2 { transition-delay:.3s; }
    .reveal-delay-3 { transition-delay:.45s; }
    .loading { display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-display);font-size:40px;color:var(--pink);letter-spacing:.2em; }

    @media(max-width:900px){
      #hero{grid-template-columns:1fr}
      .hero-right{display:none}
      .hero-left{padding:120px 24px 80px}
      nav{padding:16px 24px}
      .nav-links{display:none}
      #about{grid-template-columns:1fr;padding:70px 24px}
      .about-img{display:none}
      .single-grid{grid-template-columns:1fr}
      #music{padding:70px 24px}
      #musicCrossCanvas{display:none}
      .photo-grid{grid-template-columns:1fr 1fr}
      .p1,.p2,.p3,.p4,.p5{grid-column:span 2}
      #contact > div{padding:0 24px}
      footer{flex-direction:column;gap:20px;text-align:center}
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div id="app"><div class="loading">LOADING...</div></div>

<script>
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
});
(function animRing(){
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
})();

async function loadJSON(path) {
  try { const r=await fetch(path); if(!r.ok) return null; return r.json(); } catch(e){ return null; }
}

async function init() {
  const [general,single]=await Promise.all([loadJSON('/content/general.json'),loadJSON('/content/single.json')]);
  const g=general||{};
  const s=single||{};

  // streaming links — if none, show PRE-SAVE NOW button
  const streamLinks=[
    {key:'spotify',label:'Spotify'},
    {key:'apple',label:'Apple Music'},
    {key:'soundcloud',label:'SoundCloud'},
    {key:'youtube',label:'YouTube'},
  ].filter(l=>s[l.key])
   .map(l=>`<a href="${s[l.key]}" class="stream-btn" target="_blank">${l.label}</a>`)
   .join('')||`<a href="#contact" class="stream-btn" style="background:var(--pink);color:var(--black);border-color:var(--pink);font-weight:700;">PRE-SAVE NOW</a>`;

  const email = g.email||'judas@aprettysob.com';
  const instaHandle = g.instagram||'@aprettysob';
  const instaSlug = instaHandle.replace('@','');

  document.getElementById('app').innerHTML=`
    <!-- NAV — #5: Music, About, Press, Contact (no Live) -->
    <nav>
      <a href="#hero" class="nav-logo">JUD<span>A</span>S</a>
      <ul class="nav-links">
        <li><a href="#music">Music</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#photos">Press</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <header id="hero">
      <div class="hero-left">
        <p class="hero-tag">Debut Single, 6/26/26</p>
        <h1 class="hero-name">JU<span class="stroke">D</span><span class="pink">AS</span></h1>
        <p class="hero-sub">${g.tagline||'Queer pop provocateur. Main character energy.'}</p>
        <div class="hero-cta">
          <a href="#music" class="btn btn-primary">PRE-SAVE NOW</a>
          <a href="#photos" class="btn btn-outline">PRESS KIT</a>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-img-wrap">
          <img src="${g.hero_image||'/images/Judas_2.jpg'}" alt="${g.artist_name||'Judas'} press photo" />
          <div class="hero-img-overlay"></div>
          <div class="hero-img-fade"></div>
        </div>
      </div>
      <div class="ticker-wrap">
        <div class="ticker-track">
          <span>${g.artist_name||'JUDAS'}</span><span class="dot">✦</span>
          <span>${s.title||'LYING THIEF'}</span><span class="dot">✦</span>
          <span>6/26/26</span><span class="dot">✦</span>
          <span>QUEER POP</span><span class="dot">✦</span>
          <span>${instaHandle.toUpperCase()}</span><span class="dot">✦</span>
          <span>${g.artist_name||'JUDAS'}</span><span class="dot">✦</span>
          <span>${s.title||'LYING THIEF'}</span><span class="dot">✦</span>
          <span>6/26/26</span><span class="dot">✦</span>
          <span>QUEER POP</span><span class="dot">✦</span>
          <span>${instaHandle.toUpperCase()}</span><span class="dot">✦</span>
        </div>
      </div>
    </header>

    <!-- MUSIC — first in page order per #5 -->
    <section id="music">
      <div>
        <span class="section-label">Debut Single</span>
        <div class="single-grid">
          <div class="cover-wrap reveal">
            <img src="${s.cover||'/images/Lying_Thief_Final_Cover_Art.jpg'}" alt="${s.title||'Lying Thief'} cover art" />
            <div class="release-badge">6/26/26</div>
          </div>
          <div class="single-info">
            <div class="artist-name">${g.artist_name||'Judas'}</div>
            <h3 class="reveal">${(s.title||'LYING THIEF').replace(' ','<br><span class="stroke">').replace(/$/,'</span>')}</h3>
            <p class="reveal reveal-delay-1">Lying Thief is a scandalous club confession celebrating power and desire, drawing from the dark-pop energy of Charli XCX &amp; Slayyyter. Judas lures you onto the dance floor, his lips brushing against yours, close enough to taste. He captures your burning desire, and just as you want more, he disappears like a thief into the night. It's the best kiss you never had. Judas doesn't hold back on this all-important debut single, delivering electropop with claws. Let Lying Thief's intoxicating beats beckon you in and lose yourself to its siren call.</p>
            <div class="single-links reveal reveal-delay-2">${streamLinks}</div>
          </div>
        </div>
      </div>
      <canvas id="musicCrossCanvas"></canvas>
    </section>

    <!-- PRESS QUOTE -->
    <div class="press-strip">
      <blockquote>"${g.press_quote||'Queer Popstar!'}"</blockquote>
      <cite>${g.press_quote_source||'Grid News'}</cite>
    </div>

    <!-- ABOUT — #9 new bio, #10 no stats -->
    <section id="about">
      <div class="about-img reveal">
        <img src="${g.about_image||'/images/Judas_3.jpg'}" alt="${g.artist_name||'Judas'} artist photo" />
      </div>
      <div class="about-text">
        <span class="section-label">The Artist</span>
        <h2>Who Is<br><span class="accent">Judas?</span></h2>
        <p class="reveal">Judas is the part of you that refuses to apologize. Sexy, savage, fluid, free. Everything you were taught to keep quiet. Electropop with claws: nasty beats, glitchy synths, propulsive energy, seductive to the core. Hot pink distortion. His corrupted pop possesses your body to move and your voice to take up space.</p>
        <p class="reveal reveal-delay-1">Judas exploded onto the scene with a debut performance to thousands at Electroluxx Pride in San Francisco. Full production, iconic visuals and full choreography from day one. A queer pop provocateur, he exists for the parts of us that shrink to make others comfortable. Judas beckons you to embrace your power.</p>
        <p class="reveal reveal-delay-2">A fallen angel born under 666, he sacrificed his halo to set the stage on fire. Canadian-born and world-traveled, he's spent his life carving a path entirely his own, now SF and LA based. His debut single, "Lying Thief" will break all the rules on June 26, 2026. Trouble is on the way.</p>
      </div>
    </section>

    <div class="divider"></div>

    <!-- PHOTOS -->
    <section id="photos">
      <div>
        <span class="section-label">Press Photos</span>
        <h2 class="reveal">Press<br><span class="accent">Gallery</span></h2>
        <div class="photo-grid">
          <div class="photo-item p1 reveal"><img src="/images/Judas_1.jpg" alt="Press photo 1" /></div>
          <div class="photo-item p2 reveal reveal-delay-1"><img src="/images/Judas_3.jpg" alt="Press photo 2" /></div>
          <div class="photo-item p3 reveal reveal-delay-2"><img src="/images/touch_5.jpg" alt="Press photo 3" /></div>
          <div class="photo-item p5 reveal"><img src="${s.cover||'/images/Lying_Thief_Final_Cover_Art.jpg'}" alt="Single cover art" /></div>
          <div class="photo-item p4 reveal reveal-delay-1"><img src="/images/Judas_2.jpg" alt="Press photo 4" /></div>
          <div class="photo-item p3 reveal"><img src="/images/studo_2_edited.jpg" alt="Studio photo" style="object-fit:contain;object-position:center;background:#0a0a0a;" /></div>
          <div class="photo-item p4 reveal reveal-delay-1"><img src="/images/body_art_edited.jpg" alt="Body art photo" style="object-fit:contain;object-position:center;background:#0a0a0a;" /></div>
          <div class="photo-item p5 reveal reveal-delay-2"><img src="/images/red_2_edited.jpg" alt="Red photo" style="object-fit:contain;object-position:center;background:#0a0a0a;transform:rotate(90deg) scale(0.75);transform-origin:center center;" /></div>
        </div>
        <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;color:rgba(245,240,240,.35);margin-top:24px;text-align:right;">
          High-res assets: <a href="mailto:${email}" style="color:var(--blue);text-decoration:none;">${email}</a>
        </p>
      </div>
    </section>

    <div class="divider"></div>

    <!-- CONTACT — #12: email + instagram + location only, button links, no form, no booking -->
    <section id="contact">
      <div>
        <div class="reveal">
          <span class="section-label">Get in Touch</span>
          <h2>Press &amp;<br><span class="accent">Contact</span></h2>
          <ul class="contact-info">
            <li>
              <span class="contact-label">Email</span>
              <span class="contact-val"><a href="mailto:${email}" class="contact-btn">${email}</a></span>
            </li>
            <li>
              <span class="contact-label">Instagram</span>
              <span class="contact-val"><a href="https://instagram.com/${instaSlug}" class="contact-btn" target="_blank">${instaHandle}</a></span>
            </li>
            <li>
              <span class="contact-label">Location</span>
              <span class="contact-val">San Francisco &amp; Los Angeles</span>
            </li>
          </ul>
        </div>
      </div>
    </section>

    <!-- FOOTER — #13: no social buttons, #14: TV static canvas -->
    <div class="footer-wrap">
      <canvas id="footerCanvas"></canvas>
      <footer>
        <div class="footer-logo">JUD<span>A</span>S</div>
        <div class="footer-copy">© 2026 JUDAS JAMES. ALL RIGHTS RESERVED.</div>
      </footer>
    </div>
  `;

  document.querySelectorAll('a,button,input,textarea').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.style.transform='translate(-50%,-50%) scale(2)';cursor.style.background='var(--blue)';});
    el.addEventListener('mouseleave',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';cursor.style.background='var(--pink)';});
  });

  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:0.12});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

  setTimeout(()=>{
    initMusicCross();
    initFooterStatic();
  },100);
}

// ── MUSIC CROSS — stationary, glitch in/out, shadow silhouette + shatter lines ──
function initMusicCross() {
  const canvas = document.getElementById('musicCrossCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const PINK = '#FF2D8B';
  const BLUE = '#00F0FF';

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    setupCross();
  }

  let crossW, crossH, baseX, baseY;
  function setupCross() {
    crossW = Math.min(canvas.width * 0.18, 72);
    crossH = crossW * 3.2;
    baseX  = canvas.width  * 0.68 - crossW / 2;
    baseY  = canvas.height * 0.5  - crossH / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  function makeCross() {
    const oc = document.createElement('canvas');
    oc.width = 100; oc.height = 300;
    const c = oc.getContext('2d');
    c.clearRect(0,0,100,300);
    const cx=50, stemW=10, cbY=300*0.65, cbW=80, cbH=9;
    function jitter(x1,y1,x2,y2,w,a){
      const steps=10+Math.floor(Math.random()*6);
      c.beginPath();
      c.moveTo(x1+(Math.random()-.5)*2,y1+(Math.random()-.5)*2);
      for(let i=1;i<=steps;i++){
        const t=i/steps;
        c.lineTo(x1+(x2-x1)*t+(Math.random()-.5)*2.2,y1+(y2-y1)*t+(Math.random()-.5)*2.2);
      }
      c.strokeStyle=`rgba(255,45,139,${a})`;
      c.lineWidth=w; c.lineCap='round'; c.lineJoin='round';
      c.shadowColor=PINK; c.shadowBlur=10; c.stroke();
    }
    for(let p=0;p<5;p++) jitter(cx+(Math.random()-.5)*2,4,cx+(Math.random()-.5)*2,296,stemW-p*1.2,0.5-p*0.05);
    jitter(cx,4,cx,296,2,0.95);
    jitter(cx-stemW*.45,10,cx-stemW*.4,290,0.7,0.28);
    jitter(cx+stemW*.45,8,cx+stemW*.42,288,0.7,0.24);
    const cx1=(100-cbW)/2, cx2=cx1+cbW;
    for(let p=0;p<4;p++) jitter(cx1,cbY+(Math.random()-.5)*1.5,cx2,cbY+(Math.random()-.5)*1.5,cbH-p*1.2,0.5-p*0.06);
    jitter(cx1,cbY,cx2,cbY,2,0.92);
    jitter(cx1+4,cbY-cbH*.4,cx2-4,cbY-cbH*.38,0.6,0.25);
    jitter(cx1+4,cbY+cbH*.4,cx2-4,cbY+cbH*.38,0.6,0.22);
    c.shadowBlur=0; c.globalAlpha=0.18; c.strokeStyle='#fff'; c.lineWidth=1;
    c.beginPath(); c.moveTo(cx,8); c.lineTo(cx,292); c.stroke();
    c.beginPath(); c.moveTo(cx1+8,cbY); c.lineTo(cx2-8,cbY); c.stroke();
    c.globalAlpha=1;
    return oc;
  }

  let crossSrc = makeCross();
  // persistent dim shadow silhouette
  let shadowAlpha = 0;
  let shatterLines = [];
  let frameCount=0, lastGlitch=-9999;
  const GLITCH_INTERVAL=220;
  const FADE_DELAY=55;
  let globalAlpha=0, fadeInDone=false;
  // glitch state: cross blinks in and out
  let visible=true, glitchTimer=0, glitchPhase='idle';
  // glitchPhase: idle → out → in → idle

  function spawnShatter() {
    for(let i=0;i<10+Math.random()*8;i++){
      const angle=Math.random()*Math.PI*2;
      const len=20+Math.random()*60;
      shatterLines.push({
        x: baseX + crossW*0.5 + (Math.random()-.5)*crossW*0.8,
        y: baseY + crossH*0.5 + (Math.random()-.5)*crossH*0.5,
        angle, len,
        alpha: 0.5+Math.random()*0.4,
        color: Math.random()>.5?PINK:BLUE,
        life:1, decay:0.03+Math.random()*0.04
      });
    }
  }

  function loop(){
    frameCount++;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(!fadeInDone){
      if(frameCount>FADE_DELAY){ globalAlpha+=0.014; if(globalAlpha>=1){globalAlpha=1;fadeInDone=true;} }
    }

    // trigger glitch cycle
    if(fadeInDone && glitchPhase==='idle' && frameCount-lastGlitch>GLITCH_INTERVAL){
      glitchPhase='out'; glitchTimer=0; lastGlitch=frameCount;
      if(Math.random()>.4) crossSrc=makeCross();
    }

    if(glitchPhase==='out'){
      glitchTimer++;
      // flicker out over ~20 frames
      if(glitchTimer>20){ glitchPhase='in'; glitchTimer=0; visible=false; spawnShatter(); shadowAlpha=0.22; }
    } else if(glitchPhase==='in'){
      glitchTimer++;
      // stay invisible 10-30 frames then flicker back
      if(glitchTimer>10+Math.random()*20){ glitchPhase='idle'; glitchTimer=0; visible=true; spawnShatter(); }
    }

    // fade shadow silhouette
    if(shadowAlpha>0){
      ctx.save(); ctx.globalAlpha=shadowAlpha*globalAlpha;
      ctx.drawImage(crossSrc,baseX,baseY,crossW,crossH);
      ctx.restore();
      shadowAlpha-=0.003;
    }

    // shatter lines
    for(let i=shatterLines.length-1;i>=0;i--){
      const l=shatterLines[i];
      l.life-=l.decay;
      if(l.life<=0){shatterLines.splice(i,1);continue;}
      ctx.save();
      ctx.globalAlpha=l.alpha*l.life*globalAlpha;
      ctx.strokeStyle=l.color;
      ctx.lineWidth=1;
      ctx.shadowColor=l.color; ctx.shadowBlur=4;
      ctx.beginPath();
      ctx.moveTo(l.x,l.y);
      ctx.lineTo(l.x+Math.cos(l.angle)*l.len*l.life,l.y+Math.sin(l.angle)*l.len*l.life);
      ctx.stroke();
      ctx.restore();
    }

    // main cross
    if(visible){
      const flicker = glitchPhase==='out'?(glitchTimer%3<2?1:0.2):1;
      const mainA = globalAlpha*flicker*(0.78+Math.sin(frameCount*.018)*.07);
      // chromatic aberration during out phase
      if(glitchPhase==='out'){
        ctx.save(); ctx.globalAlpha=mainA*.4; ctx.globalCompositeOperation='screen';
        ctx.drawImage(crossSrc,baseX-4,baseY+1,crossW,crossH); ctx.restore();
        ctx.save(); ctx.globalAlpha=mainA*.4; ctx.globalCompositeOperation='screen';
        ctx.drawImage(crossSrc,baseX+4,baseY-1,crossW,crossH); ctx.restore();
      }
      ctx.save(); ctx.globalAlpha=mainA;
      ctx.drawImage(crossSrc,baseX,baseY,crossW,crossH); ctx.restore();
    }

    requestAnimationFrame(loop);
  }
  loop();
}

// ── FOOTER TV STATIC ────────────────────────────────
function initFooterStatic() {
  const canvas = document.getElementById('footerCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize(){
    canvas.width=canvas.offsetWidth;
    canvas.height=canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  const COLORS = [
    [10,10,10],       // black
    [245,240,240],    // white
    [255,45,139],     // pink
    [0,240,255],      // blue
  ];

  let phase=0, phaseT=0;
  const PHASE_DURATION=180; // frames per colour
  let fromColor=COLORS[0], toColor=COLORS[1];
  let colorIdx=0;

  function lerpColor(a,b,t){
    return [
      Math.round(a[0]+(b[0]-a[0])*t),
      Math.round(a[1]+(b[1]-a[1])*t),
      Math.round(a[2]+(b[2]-a[2])*t),
    ];
  }

  function loop(){
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // advance colour phase
    phaseT++;
    if(phaseT>PHASE_DURATION){
      phaseT=0; colorIdx=(colorIdx+1)%COLORS.length;
      fromColor=COLORS[colorIdx];
      toColor=COLORS[(colorIdx+1)%COLORS.length];
    }
    const t=phaseT/PHASE_DURATION;
    const bg=lerpColor(fromColor,toColor,t);

    // fill bg
    ctx.fillStyle=`rgb(${bg[0]},${bg[1]},${bg[2]})`;
    ctx.fillRect(0,0,W,H);

    // TV static noise
    const imgData=ctx.getImageData(0,0,W,H);
    const d=imgData.data;
    for(let i=0;i<d.length;i+=4){
      const noise=(Math.random()-.5)*120;
      d[i]  =Math.min(255,Math.max(0,d[i]+noise));
      d[i+1]=Math.min(255,Math.max(0,d[i+1]+noise));
      d[i+2]=Math.min(255,Math.max(0,d[i+2]+noise));
      d[i+3]=255;
    }
    ctx.putImageData(imgData,0,0);

    // scanlines
    for(let y=0;y<H;y+=2){
      ctx.fillStyle='rgba(0,0,0,0.08)';
      ctx.fillRect(0,y,W,1);
    }

    requestAnimationFrame(loop);
  }
  loop();
}

  window.netlifyIdentity.on('init',user=>{
    if(!user){window.netlifyIdentity.on('login',()=>{document.location.href='/admin/';});}
  });
}

init();
